<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D PDF Interactive Flipbook</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
</head>
<body>

    <div class="toolbar" style="text-align: center; margin: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <select id="pdf-selector" style="margin-right: 15px; padding: 5px;"></select>
        
        <button id="btn-prev">◀ Prev</button>
        <span style="margin: 0 10px; font-weight: bold;">
            Page <span id="current-page">-</span> of <span id="total-pages">-</span>
        </span>
        <button id="btn-next" style="margin-right: 15px;">Next ▶</button>
        
        <input type="number" id="goto-input" min="1" value="1" placeholder="Pg" style="width: 60px; padding: 5px;">
        <button id="btn-goto" style="margin-right: 15px;">Go</button>
        
        <div style="display: inline-flex; align-items: center; background: white; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; margin-right: 15px; vertical-align: middle;">
            <button id="btn-zoom-out" style="border: none; background: #e9ecef; padding: 6px 12px; cursor: pointer; font-weight: bold; border-right: 1px solid #ccc; margin: 0;">-</button>
            <span id="zoom-percentage" style="padding: 6px 10px; min-width: 50px; text-align: center; font-weight: bold; font-size: 14px;">100%</span>
            <button id="btn-zoom-in" style="border: none; background: #e9ecef; padding: 6px 12px; cursor: pointer; font-weight: bold; border-left: 1px solid #ccc; margin: 0;">+</button>
        </div>

        <input type="text" id="search-input" placeholder="Search book..." style="padding: 5px;">
        <button id="btn-search">Search</button>
        <span id="search-status" style="margin-left: 10px; color: #e74c3c; font-weight: bold;"></span>
    </div>

    <div id="scroll-wrapper" class="book-wrapper" style="width: 100%; height: 85vh; overflow: auto; background-color: #ebedef; padding-top: 60px; box-sizing: border-box; cursor: grab;">
        
        <div id="scale-wrapper" style="width: 900px; height: 600px; margin: 0 auto; padding-top: 40px; padding-bottom: 100px; transition: width 0.3s, height 0.3s; display: flex; justify-content: center; box-sizing: content-box;">
            
            <div class="book-container" style="transform-origin: top center; transition: transform 0.3s ease;">
                </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
